name: CI/CD Pipeline — E-Commerce Platform

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}

jobs:
  test-backend:
    name: Run Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run Tests
        run: |
          cd backend
          mvn test -Dspring.profiles.active=test

  test-frontend:
    name: Run Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install & Build
        run: |
          cd frontend
          npm ci
          npm run build

  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push Backend Image
        run: |
          cd backend
          docker build -t ${{ secrets.ECR_REGISTRY }}/ecommerce-backend:${{ github.sha }} .
          docker tag ${{ secrets.ECR_REGISTRY }}/ecommerce-backend:${{ github.sha }} \
                     ${{ secrets.ECR_REGISTRY }}/ecommerce-backend:latest
          docker push ${{ secrets.ECR_REGISTRY }}/ecommerce-backend:${{ github.sha }}
          docker push ${{ secrets.ECR_REGISTRY }}/ecommerce-backend:latest

      - name: Build & Push Frontend Image
        run: |
          cd frontend
          docker build -t ${{ secrets.ECR_REGISTRY }}/ecommerce-frontend:${{ github.sha }} .
          docker tag ${{ secrets.ECR_REGISTRY }}/ecommerce-frontend:${{ github.sha }} \
                     ${{ secrets.ECR_REGISTRY }}/ecommerce-frontend:latest
          docker push ${{ secrets.ECR_REGISTRY }}/ecommerce-frontend:${{ github.sha }}
          docker push ${{ secrets.ECR_REGISTRY }}/ecommerce-frontend:latest

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
              docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}

            docker pull ${{ secrets.ECR_REGISTRY }}/ecommerce-backend:latest
            docker pull ${{ secrets.ECR_REGISTRY }}/ecommerce-frontend:latest

            mkdir -p /home/ubuntu/app

            cat > /home/ubuntu/app/docker-compose.yml << 'COMPOSE'
            version: '3.8'
            services:
              backend:
                image: ${{ secrets.ECR_REGISTRY }}/ecommerce-backend:latest
                ports:
                  - "8080:8080"
                environment:
                  DB_URL: ${{ secrets.DB_URL }}
                  DB_USERNAME: ${{ secrets.DB_USERNAME }}
                  DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
                  JWT_SECRET: ${{ secrets.JWT_SECRET }}
                  JWT_EXPIRATION: 86400000
                restart: always

              frontend:
                image: ${{ secrets.ECR_REGISTRY }}/ecommerce-frontend:latest
                ports:
                  - "80:3000"
                depends_on:
                  - backend
                restart: always
            COMPOSE

            cd /home/ubuntu/app
            docker compose down || true
            docker compose up -d
            docker image prune -f